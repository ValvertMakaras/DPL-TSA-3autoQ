<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Auto-questionnaires TSA — Les Makaras</title>
<style>
:root{
  --topbar-h:60px;
  --ink:#15323a; --teal:#1f6f78; --teal-d:#16515a; --teal-l:#3a8a93;
  --ivory:#f3ecdf; --paper:#ffffff; --cream:#f6f0e6; --line:#dcd3c4;
  --tint:#e6f0f0; --soft:#eef3f3; --danger:#9c4221; --ok:#2f7d57;
  --shadow:0 1px 2px rgba(20,50,58,.06),0 8px 24px rgba(20,50,58,.06);
  --font:"Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font);color:var(--ink);background:var(--ivory);font-size:15px;line-height:1.5}
a{color:var(--teal-d)}
button{font-family:inherit}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:40;background:rgba(243,236,223,.92);backdrop-filter:saturate(1.2) blur(6px);border-bottom:1px solid var(--line)}
.topbar .inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:10px 16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;color:var(--teal-d);letter-spacing:.01em;font-size:15px}
.brand .tag{font-size:10.5px;font-weight:800;color:#fff;background:var(--teal);padding:2px 9px;border-radius:999px;letter-spacing:.05em;text-transform:uppercase}
.actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;color:var(--teal-d);font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--teal-l)}
.btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.primary:hover{background:var(--teal-d)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.5;cursor:default}
.menubtn{display:none}

/* ===== Layout ===== */
.wrap{max-width:1080px;margin:0 auto;display:block;padding:18px 16px 80px}
.wrap.has-side{display:grid;grid-template-columns:248px minmax(0,1fr);gap:24px}
.side{display:none}
.wrap.has-side .side{display:block;position:sticky;top:64px;align-self:start;max-height:calc(100vh - 84px);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px}
.side h4{margin:4px 6px 4px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--teal-l)}
.side .ov{margin:0 6px 10px;font-size:12.5px;color:#6b7a7e}
.side .prog{height:7px;border-radius:99px;background:var(--soft);margin:0 6px 12px;overflow:hidden}
.side .prog i{display:block;height:100%;background:var(--teal);transition:.3s}
.snav button{display:flex;gap:10px;align-items:center;width:100%;text-align:left;border:0;background:transparent;padding:9px 10px;border-radius:9px;cursor:pointer;font-family:inherit;color:var(--ink)}
.snav button:hover{background:var(--soft)}
.snav button.active{background:var(--tint)}
.snav .sdot{flex:0 0 24px;height:24px;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:800;color:var(--teal-d)}
.snav button.active .sdot{box-shadow:0 0 0 2px var(--teal) inset}
.snav .sinfo{display:flex;flex-direction:column;line-height:1.2}
.snav .sn{font-size:13.5px;font-weight:600}
.snav .sp{font-size:11.5px;color:#6b7a7e}
.snav .sp.done{color:var(--ok);font-weight:700}
.side .homebtn{margin-top:8px}

/* ===== Banner / document ===== */
.banner-img{display:block;width:min(620px,100%);margin:4px auto 18px;border-radius:16px;box-shadow:0 2px 6px rgba(20,50,58,.08),0 12px 30px rgba(20,50,58,.10)}
.doc{background:var(--paper);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:24px clamp(16px,3vw,32px)}
.hero{text-align:center;margin:4px 0 14px}
.hero h1{margin:6px 0 2px;font-size:25px;color:var(--teal-d);letter-spacing:.01em}
.hero .lead{margin:0;color:#5b6a6d;font-weight:600;font-size:14.5px}
.intro{color:#42514f;margin:0 0 14px;text-align:justify}

.qcards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
.qcard{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 14px;box-shadow:var(--shadow)}
.qcard .badge{flex:0 0 42px;height:42px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:var(--teal-d);font-size:14px}
.qcard .nm{margin:0;font-weight:800;color:var(--teal-d);font-size:15px}
.qcard .ds{margin:2px 0 0;font-size:12.5px;color:#5b6a6d;line-height:1.35}
.qcard .cnt{margin-left:auto;font-size:12px;color:#6b7a7e;white-space:nowrap;align-self:flex-start}

.callout{background:var(--cream);border:1px solid var(--line);border-left:5px solid var(--teal);border-radius:12px;padding:13px 15px;margin:14px 0}
.callout strong{color:var(--teal-d)}
.callout ul{margin:8px 0 0;padding-left:20px}
.callout li{margin:5px 0}
.vigil{background:#fdf3ee;border:1px solid #efd9cb;border-left:5px solid var(--danger);border-radius:12px;padding:13px 15px;margin:14px 0;font-size:13.7px;color:#6a4a3a;line-height:1.5}
.vigil .vh{font-weight:800;color:var(--danger);margin-bottom:5px}

.formcard{margin:16px 0 6px}
.formcard h2{margin:0 0 4px;font-size:17px;color:var(--teal-d)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin:8px 0}
.field label{font-weight:600;display:block;margin-bottom:3px;font-size:13.5px}
input[type=text],input[type=date]{width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
input:focus{outline:2px solid var(--teal-l);outline-offset:1px;border-color:var(--teal-l)}
.muted{color:#6b7a7e;font-size:13px}
.center{text-align:center}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:18px}

/* ===== Questionnaire head ===== */
.qhead{margin:2px 0 12px}
.qhead h2{margin:0;font-size:19px;color:var(--teal-d)}
.qhead .sub{margin:2px 0 0;color:#5b6a6d;font-size:13.5px}
.insn{margin:10px 0 0;background:var(--tint);border:1px solid #cfe1e1;border-radius:10px;padding:10px 12px;color:var(--teal-d);font-size:13.3px;line-height:1.5}

/* ===== Likert table (compact) ===== */
.tblwrap{overflow:visible;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--shadow)}
.likert{width:100%;border-collapse:collapse;font-size:13px}
.likert thead th{position:sticky;top:var(--topbar-h);z-index:6;box-shadow:0 3px 4px -2px rgba(20,50,58,.22)}
.likert th{background:var(--teal);color:#fff;font-weight:700;padding:7px 5px;border:1px solid #cfd9d9;text-align:center;font-size:11px;line-height:1.15;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.likert th.h-item{text-align:left;min-width:200px}
.likert thead th:first-child{border-top-left-radius:11px}
.likert thead th:last-child{border-top-right-radius:11px}
.likert td{border:1px solid #e3e9e9;vertical-align:middle}
.likert td.itemnum{background:var(--qaccent,#eef3f3);color:var(--teal-d);text-align:center;font-weight:700;width:30px;font-size:12px}
.likert td.itemtxt{padding:6px 10px;line-height:1.3;color:#243b40}
.likert td.likcell{text-align:center;width:54px;padding:3px}
.likert tr.qrow:nth-child(odd) td.itemtxt,.likert tr.qrow:nth-child(odd) td.likcell{background:#fafbfb}
.cellradio{display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:26px;margin:0}
.cellradio input{position:absolute;opacity:0;width:0;height:0}
.tick{display:inline-block;width:19px;height:19px;border:1.7px solid var(--teal-l);border-radius:5px;background:#fff;box-sizing:border-box;position:relative;transition:.12s}
.cellradio:hover .tick{border-color:var(--teal)}
.cellradio input:checked+.tick{background:var(--teal);border-color:var(--teal-d)}
.cellradio input:checked+.tick::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;border:2px solid #fff;border-top:0;border-left:0;transform:rotate(45deg);box-sizing:border-box}
.likert td.cmtcell{width:34px;text-align:center;padding:2px}
.cbtn{border:1px solid var(--line);background:#fff;color:#9aa6a6;width:28px;height:28px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
.cbtn:hover{border-color:var(--teal-l);color:var(--teal)}
.cbtn.has{background:var(--teal);border-color:var(--teal);color:#fff}
.cbtn svg{width:15px;height:15px}
.likert tr.qrow.miss td{background:#fdeee7!important}
.likert tr.qrow.miss td.itemnum{background:#f4c9b4!important}
.cmtrow td{padding:0;background:#fffdf8}
.cmtbox{padding:8px 12px;display:flex;flex-direction:column;gap:5px}
.cmtbox label{font-size:12px;color:#6b7a7e;font-weight:600}
.cmtbox textarea{width:100%;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:7px 9px;resize:vertical;min-height:40px;background:#fff}
.cmtbox textarea:focus{outline:2px solid var(--teal-l);outline-offset:1px;border-color:var(--teal-l)}

/* actions (inline) */
.actions-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px}
.actions-row .spacer{flex:1}

/* thanks */
.bigcheck{width:62px;height:62px;border-radius:50%;background:#e9f4ee;border:2px solid #bfe0cf;display:grid;place-items:center;margin:6px auto 4px}
.bigcheck svg{width:30px;height:30px}
.mailbtns{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
.mailbtn{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:11px;padding:11px 16px;text-decoration:none;color:var(--ink);font-weight:600;background:#fff}
.mailbtn:hover{border-color:var(--teal-l)}
.mailbtn .mp{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff}
.mailbtn .mp svg{width:17px;height:17px}
.code{width:100%;min-height:88px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fbfaf6;resize:vertical;word-break:break-all}

/* banner message in-page */
.flash{background:#fdf3ee;border:1px solid #efd9cb;border-left:5px solid var(--danger);border-radius:10px;padding:10px 13px;margin:0 0 14px;color:#6a4a3a;font-size:13.5px}

.footer{max-width:1080px;margin:18px auto 0;padding:0 16px;color:#6b7a7e;font-size:12.5px;text-align:center}

/* toast */
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--teal-d);color:#fff;padding:11px 18px;border-radius:11px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:60;font-weight:600}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* modal */
.modal{position:fixed;inset:0;background:rgba(20,40,46,.45);display:none;place-items:center;z-index:80;padding:20px}
.modal.show{display:grid}
.modalbox{background:#fff;border-radius:14px;max-width:480px;width:100%;padding:24px;box-shadow:var(--shadow)}
.modalbox h2{margin:0 0 8px;font-size:18px;color:var(--teal-d)}
.modalbox p{margin:0 0 18px;color:var(--ink);line-height:1.5}
.modalbox .mf{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}

/* ===== steps + code fallback (thanks page) ===== */
.step{display:flex;gap:12px;align-items:flex-start;margin:12px 0}
.step .snum{flex:0 0 28px;height:28px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px}
.step .stxt{flex:1}
.step b{color:var(--teal-d)}
.codefold{margin:18px 0 0;border:1px solid var(--line);border-radius:10px;padding:10px 14px;background:#fbfaf6}
.codefold summary{cursor:pointer;font-weight:600;color:var(--teal-d);font-size:13.5px}
.codefold .muted{margin:8px 0}
.codefold .code{margin-top:10px}

/* ===== PRINT (PDF) ===== */
.printdoc{display:none}
@media print{
  @page{size:A4;margin:13mm 13mm 15mm}
  body{background:#fff}
  .topbar,.wrap,.footer,.scrim,.toast,.modal,.menubtn{display:none!important}
  .printdoc{display:block;color:#15323a;font-size:11px}
  .printdoc .p-banner{display:block;width:min(150mm,100%);margin:0 auto 8px}
  .printdoc .p-title{text-align:center;font-weight:800;color:#16515a;font-size:14px;border:2px solid #1f6f78;border-radius:8px;padding:8px;margin:0 0 10px}
  .printdoc .p-title small{display:block;font-weight:700;color:#1f6f78;font-size:11px;margin-top:2px}
  .printdoc .p-id{width:100%;border-collapse:collapse;margin:0 0 6px;font-size:10.5px}
  .printdoc .p-id td{border:1px solid #cfd9d9;padding:4px 7px}
  .printdoc .p-id td.k{background:#eef3f3;font-weight:700;color:#16515a;width:22%;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .printdoc .p-q{margin:12px 0 5px;background:#1f6f78;color:#fff;padding:5px 9px;border-radius:4px;font-size:12px;font-weight:700;break-after:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .printdoc .p-q small{font-weight:600;opacity:.9}
  .printdoc .p-tbl{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:4px}
  .printdoc .p-tbl th{background:#eef3f3;color:#16515a;border:1px solid #cfd9d9;padding:4px 6px;text-align:left;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .printdoc .p-tbl td{border:1px solid #d9e0e0;padding:3px 6px;vertical-align:top}
  .printdoc .p-tbl td.num{text-align:center;width:24px;color:#16515a;font-weight:700}
  .printdoc .p-tbl td.ans{font-weight:700;color:#1f6f78;white-space:nowrap}
  .printdoc .p-tbl td.ans.none{color:#9c4221;font-weight:600}
  .printdoc .p-tbl tr{break-inside:avoid}
  .printdoc .p-tbl tr.cmt td{background:#fbf7ee;font-style:italic;color:#5b6a6d;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .printdoc .p-code{break-inside:avoid;margin:14px 0 0;border:1.5px solid #1f6f78;border-radius:8px;padding:10px 12px;background:#f6f0e6;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .printdoc .p-code-h{font-weight:800;color:#16515a;font-size:11px;margin-bottom:2px}
  .printdoc .p-code-note{font-size:9.5px;color:#5b6a6d;margin-bottom:6px}
  .printdoc .p-code-val{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:9px;word-break:break-all;background:#fff;border:1px solid #cfd9d9;border-radius:5px;padding:6px}
  .printdoc .p-foot{margin-top:8px;font-size:8.5px;color:#6b7a7e;text-align:center}
}

@media (max-width:760px){
  .tblwrap{overflow-x:auto}
  .likert thead th{position:static;box-shadow:none}
}
@media (max-width:880px){
  .wrap.has-side{grid-template-columns:1fr}
  .wrap.has-side .side{position:fixed;inset:0 auto 0 0;width:280px;z-index:50;max-height:100vh;border-radius:0;transform:translateX(-100%);transition:.25s}
  .wrap.has-side .side.open{transform:none}
  .menubtn{display:inline-flex}
  .scrim{position:fixed;inset:0;background:rgba(20,40,46,.4);z-index:45;display:none}
  .scrim.show{display:block}
  .row2,.qcards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <button class="btn ghost menubtn" id="menuBtn" aria-label="Questionnaires">&#9776;</button>
    <div class="brand">Auto-questionnaires<span class="tag">DPL&nbsp;TSA</span></div>
    <div class="actions">
      <button class="btn" id="saveBtn" title="Enregistrer votre progression dans un fichier .json sur votre appareil">&#128190; Enregistrer (.json)</button>
      <button class="btn" id="loadBtn" title="Reprendre à partir d'un fichier .json">&#128193; Reprendre</button>
      <input type="file" id="loadInput" accept="application/json,.json" hidden>
    </div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="wrap" id="wrap">
  <aside class="side" id="side"></aside>
  <main id="main"></main>
</div>

<div class="footer">LES MAKARAS — Unité Mobile · Centre Hospitalier Valvert · Hôpitaux de Provence · UMAA@ch-valvert.fr</div>
<div class="printdoc" id="printdoc"></div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="modalbox" id="modalbox"></div></div>

    <div class="formcard">
      <h2>Vos informations</h2>
      <p class="muted" style="margin:2px 0 10px">Elles permettent à votre médecin d'identifier vos réponses.</p>
      <div class="row2">
        <div class="field"><label for="nom">Nom</label><input type="text" id="nom" autocomplete="family-name" value="${esc(state.id.nom)}"></div>
        <div class="field"><label for="prenom">Prénom</label><input type="text" id="prenom" autocomplete="given-name" value="${esc(state.id.prenom)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label for="naissance">Date de naissance</label><input type="date" id="naissance" value="${esc(state.id.naissance)}"></div>
        <div class="field"><label for="dateJour">Date du jour</label><input type="date" id="dateJour" value="${esc(state.id.dateJour)}"></div>
      </div>
    </div>
    <div class="cta-row">
      <button class="btn primary" id="start">Commencer</button>
      <span class="muted">3 questionnaires · ${TOTAL} questions · environ 30 minutes</span>
    </div>
  </div>`;
  if(!state.id.dateJour){ state.id.dateJour=todayISO(); document.getElementById('dateJour').value=state.id.dateJour; }
  ['nom','prenom','naissance','dateJour'].forEach(k=>document.getElementById(k).addEventListener('input',e=>{state.id[k]=e.target.value;}));
  document.getElementById('start').onclick=()=>{
    if(!state.id.nom||!state.id.prenom){ showFlash('Veuillez indiquer au moins votre nom et votre prénom.'); return; }
    state.view="questionnaire"; state.qi=0; render();
  };
}
function showFlash(msg){
  let host=main.querySelector('.doc')||main.firstElementChild; if(!host)return;
  let b=document.getElementById('flash');
  if(!b){b=document.createElement('div');b.id='flash';b.className='flash';host.insertBefore(b,host.firstChild.nextSibling);}
  b.textContent=msg; window.scrollTo(0,0);
}

/* ============ SIDEBAR ============ */
function sidebarHTML(){
  const pct=Math.round(totalAnswered()/TOTAL*100);
  let items='';
  Q.forEach((q,i)=>{const a=answered(q.id),done=isComplete(q.id);
    items+=`<button class="${i===state.qi?'active':''}" data-go="${i}"><span class="sdot" style="background:${q.tint}">${i+1}</span>
      <span class="sinfo"><span class="sn">${esc(q.short)}</span><span class="sp ${done?'done':''}">${done?'\u2713 complété':a+' / '+q.items.length}</span></span></button>`;});
  return `<h4>Questionnaires</h4><div class="ov">${pct}\u00A0% complété</div>
    <div class="prog"><i style="width:${pct}%"></i></div>
    <div class="snav">${items}</div>
    <button class="btn ghost homebtn" data-home="1" style="width:100%">&#8249; Accueil</button>`;
}
function bindSidebar(){
  side.querySelectorAll('.snav button').forEach(b=>b.onclick=()=>{ saveCurrentInputs(); state.qi=+b.dataset.go; render(); });
  const h=side.querySelector('[data-home]'); if(h)h.onclick=()=>{ saveCurrentInputs(); setView('home'); };
}
document.getElementById('menuBtn').onclick=()=>{side.classList.toggle('open');scrim.classList.toggle('show');};
scrim.onclick=()=>{side.classList.remove('open');scrim.classList.remove('show');};
function refreshSidebar(){ if(state.view==="questionnaire"){ side.innerHTML=sidebarHTML(); bindSidebar(); } }
function saveCurrentInputs(){ /* answers are live in state; comment textareas bind on input */ }

/* ============ QUESTIONNAIRE ============ */
const CICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z"/></svg>';
function renderQ(){
  const q=Q[state.qi], ans=state.ans[q.id], com=state.comments[q.id];
  let head='<tr><th></th><th class="h-item">Items</th>';
  q.opts.forEach(o=>head+=`<th>${esc(o)}</th>`);
  head+='<th></th></tr>';
  let rows='';
  q.items.forEach((it,i)=>{
    let cells='';
    q.opts.forEach((o,ci)=>{
      cells+=`<td class="likcell"><label class="cellradio"><input type="radio" name="${q.id}_${i}" value="${ci}"${ans[i]===ci?' checked':''}><span class="tick"></span></label></td>`;
    });
    const has=com[i]&&com[i].trim()?' has':'';
    rows+=`<tr class="qrow" data-i="${i}"><td class="itemnum">${it.n}</td><td class="itemtxt">${esc(it.text)}</td>${cells}<td class="cmtcell"><button class="cbtn${has}" data-ci="${i}" title="Ajouter un commentaire (facultatif)" aria-label="Commentaire">${CICON}</button></td></tr>`;
  });
  const first=state.qi===0, last=state.qi===Q.length-1;
  const nextBtn = last
    ? `<button class="btn primary" id="send">Envoyer mes réponses</button>`
    : `<button class="btn primary" id="next">Questionnaire suivant &#8250;</button>`;
  const prevBtn = first ? '' : `<button class="btn" id="prev">&#8249; Précédent</button>`;
  main.innerHTML=`<div class="qhead"><h2>${esc(q.title)}</h2><p class="sub">${esc(q.subtitle)}</p>
      <div class="insn">${esc(q.instruction)}</div></div>
    <div class="tblwrap"><table class="likert" style="--qaccent:${q.tint}"><thead>${head}</thead><tbody>${rows}</tbody></table></div>
    <div class="actions-row">${prevBtn}<span class="spacer"></span>${nextBtn}</div>`;

  const tbody=main.querySelector('.likert tbody');
  tbody.addEventListener('click',e=>{
    const lab=e.target.closest('label.cellradio'); if(!lab)return;
    e.preventDefault();
    const inp=lab.querySelector('input'); const tr=lab.closest('tr.qrow'); const i=+tr.dataset.i;
    const was = ans[i]===+inp.value;
    tbody.querySelectorAll(`input[name="${q.id}_${i}"]`).forEach(r=>r.checked=false);
    if(was){ ans[i]=null; } else { inp.checked=true; ans[i]=+inp.value; tr.classList.remove('miss'); }
    refreshSidebar();
  });
  main.querySelectorAll('.cbtn').forEach(b=>b.onclick=()=>toggleComment(b,q.id));
  if(last)document.getElementById('send').onclick=trySend;
  else document.getElementById('next').onclick=()=>{ state.qi++; render(); };
  if(!first)document.getElementById('prev').onclick=()=>{ state.qi--; render(); };
}

function toggleComment(btn,qid){
  const tr=btn.closest('tr.qrow'); const i=+btn.dataset.ci;
  const next=tr.nextElementSibling;
  if(next && next.classList.contains('cmtrow')){ next.remove(); return; }
  const ncol=tr.children.length;
  const crow=document.createElement('tr'); crow.className='cmtrow';
  crow.innerHTML=`<td colspan="${ncol}"><div class="cmtbox"><label>Commentaire (facultatif)</label><textarea rows="2"></textarea></div></td>`;
  tr.after(crow);
  const ta=crow.querySelector('textarea');
  ta.value=state.comments[qid][i]||'';
  ta.focus();
  ta.addEventListener('input',()=>{
    state.comments[qid][i]=ta.value;
    btn.classList.toggle('has', !!ta.value.trim());
  });
}

/* ============ SEND ============ */
function incompleteInfo(){
  const list=Q.map((q,qi)=>({short:q.short,qi,nums:[]}));
  Q.forEach((q,qi)=>{state.ans[q.id].forEach((v,i)=>{if(v===null)list[qi].nums.push(q.items[i].n);});});
  const withMiss=list.filter(x=>x.nums.length);
  const total=withMiss.reduce((s,x)=>s+x.nums.length,0);
  return {withMiss,total};
}
function trySend(){
  const {withMiss,total}=incompleteInfo();
  if(total===0)return doSend();
  showModal(`<h2>Réponses incomplètes</h2>
    <p>Vous n'avez pas répondu à toutes les questions (${total} sans réponse). Vous pouvez revenir les compléter, ou envoyer vos réponses telles quelles.</p>
    <div class="mf"><button class="btn" id="msee">Voir les questions manquantes</button><button class="btn primary" id="msend">Envoyer quand même</button></div>`);
  document.getElementById('msend').onclick=()=>{closeModal();doSend();};
  document.getElementById('msee').onclick=()=>{
    closeModal();
    const f=withMiss[0]; state.qi=f.qi; render();
    state.ans[Q[f.qi].id].forEach((v,i)=>{if(v===null){const r=main.querySelector('.qrow[data-i="'+i+'"]');if(r)r.classList.add('miss');}});
    const r=main.querySelector('.qrow.miss'); if(r)r.scrollIntoView({behavior:'smooth',block:'center'});
    toast('Questions manquantes surlignées');
  };
}
function compact(){
  const a={},c={};
  Q.forEach(q=>{
    a[q.id]=state.ans[q.id].map(v=>v===null?'-':String(v)).join('');
    const o={}; state.comments[q.id].forEach((t,i)=>{if(t&&t.trim())o[i]=t.trim();}); if(Object.keys(o).length)c[q.id]=o;
  });
  return {v:3, ts:new Date().toISOString(), id:state.id, a, c};
}
function makeCode(){return 'DPL3:'+btoa(unescape(encodeURIComponent(JSON.stringify(compact()))));}
function safeName(){return (state.id.nom+'_'+state.id.prenom).replace(/[^A-Za-z0-9_\-]/g,'').slice(0,40)||'patient';}
function doSend(){ state._sending=true; state._code=makeCode(); state.view="thanks"; render(); }

function mailParts(){
  const subject='Auto-questionnaires TSA — '+state.id.nom+' '+state.id.prenom;
  const body="Bonjour,\n\nVeuillez trouver ci-joint mes questionnaires TSA au format PDF.\n\nCordialement,\n"+state.id.prenom+" "+state.id.nom;
  return {subject,body};
}
function copyText(t,btn,label){try{navigator.clipboard.writeText(t);}catch(e){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}if(btn){const o=btn.textContent;btn.textContent=label||'Copié \u2713';setTimeout(()=>btn.textContent=o,1600);}}

function frDate(iso){ if(!iso) return '—'; const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso); return m? m[3]+'/'+m[2]+'/'+m[1] : iso; }

function buildPrintDoc(){
  const code=makeCode();
  let html=`<img class="p-banner" src="${BANNER}" alt="Les Makaras — CH Valvert">
    <div class="p-title">Auto-questionnaires TSA<small>Dispositif de Première Ligne — Les Makaras · Unité Mobile · CH Valvert</small></div>
    <table class="p-id">
      <tr><td class="k">Nom</td><td>${esc(state.id.nom||'—')}</td><td class="k">Prénom</td><td>${esc(state.id.prenom||'—')}</td></tr>
      <tr><td class="k">Date de naissance</td><td>${esc(frDate(state.id.naissance))}</td><td class="k">Date du jour</td><td>${esc(frDate(state.id.dateJour))}</td></tr>
    </table>`;
  Q.forEach(q=>{
    html+=`<div class="p-q">${esc(q.title)} <small>— ${esc(q.subtitle)}</small></div>`;
    html+=`<table class="p-tbl"><thead><tr><th style="width:24px">N°</th><th>Proposition</th><th style="width:34%">Réponse</th></tr></thead><tbody>`;
    q.items.forEach((it,i)=>{
      const v=state.ans[q.id][i];
      const ansTxt = (v===null||v===undefined)? '— (sans réponse)' : q.opts[v];
      const none = (v===null||v===undefined)? ' none':'';
      html+=`<tr><td class="num">${it.n}</td><td>${esc(it.text)}</td><td class="ans${none}">${esc(ansTxt)}</td></tr>`;
      const c=state.comments[q.id][i];
      if(c&&c.trim()) html+=`<tr class="cmt"><td></td><td colspan="2">Commentaire : ${esc(c.trim())}</td></tr>`;
    });
    html+=`</tbody></table>`;
  });
  html+=`<div class="p-code"><div class="p-code-h">Code de transmission — à l'usage de l'équipe soignante</div>
    <div class="p-code-note">À reporter dans l'outil de cotation des Makaras pour importer automatiquement les réponses. Le patient n'a rien à en faire.</div>
    <div class="p-code-val">${esc(code)}</div></div>
    <div class="p-foot">Document généré le ${esc(frDate(todayISO()))} · Les Makaras — CH Valvert · ${esc(DEST_EMAIL)}</div>`;
  document.getElementById('printdoc').innerHTML=html;
}
function generatePdf(){
  buildPrintDoc();
  const prev=document.title;
  document.title='Questionnaires-TSA_'+safeName();
  window.print();
  setTimeout(()=>{document.title=prev;},700);
}

function renderThanks(){
  const code=makeCode();
  const {subject,body}=mailParts();
  const eS=encodeURIComponent(subject), eB=encodeURIComponent(body), eT=encodeURIComponent(DEST_EMAIL);
  const gmail='https://mail.google.com/mail/?view=cm&fs=1&to='+eT+'&su='+eS+'&body='+eB;
  const outlook='https://outlook.live.com/mail/0/deeplink/compose?to='+eT+'&subject='+eS+'&body='+eB;
  const ENV='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>';
  main.innerHTML=`<div class="doc">
    <img class="banner-img" src="${BANNER}" alt="Les Makaras — CH Valvert · Hôpitaux de Provence">
    <div class="center"><div class="bigcheck"><svg viewBox="0 0 24 24" fill="none" stroke="#2f7d57" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
      <h1 style="margin:4px 0 0;color:var(--teal-d);font-size:23px">Questionnaire terminé</h1>
      <p class="muted" style="margin:6px 0 0">Besoin de corriger quelque chose ? Vous pouvez revenir à tout moment.</p></div>
    <div class="actions-row" style="justify-content:center;margin-top:12px">
      <button class="btn" id="back">&#8249; Revenir modifier mes réponses</button>
    </div>
    <div class="formcard">
      <h2>Transmettre vos réponses</h2>
      <p class="intro" style="margin:4px 0 6px">Deux étapes simples : générez le PDF de vos réponses, puis envoyez-le par e-mail.</p>
      <div class="step"><span class="snum">1</span><div class="stxt">
        <b>Générez le PDF</b> de vos réponses et enregistrez-le sur votre appareil (dans la fenêtre d'impression, choisissez «&nbsp;Enregistrer au format PDF&nbsp;»).
        <div class="actions-row"><button class="btn primary" id="pdf">&#128196; Générer le PDF</button></div>
      </div></div>
      <div class="step"><span class="snum">2</span><div class="stxt">
        <b>Envoyez ce PDF par e-mail</b> à <strong>${esc(DEST_EMAIL)}</strong>, en pièce jointe. Un e-mail déjà rédigé peut s'ouvrir ci-dessous&nbsp;:
        <div class="mailbtns">
          <a class="mailbtn" href="${gmail}" target="_blank" rel="noopener"><span class="mp" style="background:#EA4335">${ENV}</span>Ouvrir dans Gmail</a>
          <a class="mailbtn" href="${outlook}" target="_blank" rel="noopener"><span class="mp" style="background:#0078D4">${ENV}</span>Ouvrir dans Outlook</a>
        </div>
        <p class="muted" style="margin:8px 0 0">&#128206; Pensez à <strong>joindre le fichier PDF</strong> que vous venez d'enregistrer avant d'envoyer. Pas de Gmail ni d'Outlook&nbsp;? Écrivez à <a href="mailto:${esc(DEST_EMAIL)}">${esc(DEST_EMAIL)}</a> depuis votre messagerie habituelle, en joignant le PDF.</p>
      </div></div>
    </div>
    <p class="muted center" style="margin-top:14px">Une fois le PDF envoyé, vous pouvez fermer cette page.</p>
  </div>`;
  document.getElementById('back').onclick=()=>{ state._sending=false; state.view="questionnaire"; render(); };
  document.getElementById('pdf').onclick=generatePdf;
}

/* ============ SAVE / RESUME (.json) ============ */
document.getElementById('saveBtn').onclick=()=>{
  const payload={ app:'TSA-autoq', version:1, savedAt:new Date().toISOString(),
    state:{ id:state.id, qi:state.qi, ans:state.ans, comments:state.comments } };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='TSA-progression_'+safeName()+'_'+(state.id.dateJour||todayISO())+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Progression enregistrée');
};
document.getElementById('loadBtn').onclick=()=>document.getElementById('loadInput').click();
document.getElementById('loadInput').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const obj=JSON.parse(r.result);
      if(obj.app!=='TSA-autoq' || !obj.state) throw new Error('format');
      const s=obj.state;
      freshArrays();
      state.id = Object.assign({nom:"",prenom:"",naissance:"",dateJour:""}, s.id||{});
      Q.forEach(q=>{
        if(Array.isArray(s.ans&&s.ans[q.id])){ s.ans[q.id].forEach((v,i)=>{ if(i<state.ans[q.id].length) state.ans[q.id][i]=(v===null?null:+v); }); }
        if(Array.isArray(s.comments&&s.comments[q.id])){ s.comments[q.id].forEach((t,i)=>{ if(i<state.comments[q.id].length) state.comments[q.id][i]=t||""; }); }
      });
      state._sending=false; state._code=null;
      state.qi=(typeof s.qi==='number' && s.qi>=0 && s.qi<Q.length)?s.qi:0;
      state.view = totalAnswered()>0 ? "questionnaire" : "home";
      render();
      toast('Progression rechargée');
    }catch(err){
      showModal(`<h2>Fichier non reconnu</h2><p>Ce fichier ne semble pas être une sauvegarde des auto-questionnaires TSA. Vérifiez que vous avez bien sélectionné le fichier «&nbsp;TSA-progression…&nbsp;.json&nbsp;» téléchargé précédemment.</p><div class="mf"><button class="btn primary" id="mok">J'ai compris</button></div>`);
      document.getElementById('mok').onclick=closeModal;
    }
  };
  r.readAsText(file);
  e.target.value='';
};

/* ============ INIT ============ */
function setTopbarH(){var tb=document.querySelector('.topbar');if(tb)document.documentElement.style.setProperty('--topbar-h',Math.round(tb.getBoundingClientRect().height)+'px');}
setTopbarH();
window.addEventListener('resize',setTopbarH);
window.addEventListener('load',setTopbarH);
render();
</script>
</body>
</html>
